
<!DOCTYPE html>
<html>
<head>
<title>DevOps Todo App</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:100px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h1>DevOps Todo App 🚀</h1>

<button onclick="checkAPI()">Test Backend</button>

<p id="result"></p>

<script>
async function checkAPI(){

let res = await fetch("/");

let data = await res.json();

document.getElementById("result").innerText =
data.message;

}
</script>

</body>
</html>
